<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT 12 - Desa Purbosari</title>

    <link rel="stylesheet" href="style.css">

    <!-- CSS khusus RT 12 -->
    <style>
        .gallery-grid{
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }

        .gallery-item{
            flex: 0 1 360px;
        }

        .gallery-item img{
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .gallery-item h3{
            font-size: 26px;
        }
    </style>

</head>

<body>

<section class="gallery">

    <h1>RT 12</h1>

    <div class="gallery-grid">

        <!-- Masjid Darussalam -->
        <div class="gallery-item">
            <img src="images/masjid-darussalam.jpeg" alt="Masjid Darussalam">
            <h3>Masjid Darussalam</h3>
        </div>

        <!-- Kuburan Siti Inggil -->
        <div class="gallery-item">
            <img src="images/kuburan-siti-inggil.jpeg" alt="Kuburan Siti Inggil">
            <h3>Kuburan Siti Inggil</h3>
        </div>

    </div>

    <a href="index.html" class="back-btn">
        ← Kembali ke Beranda
    </a>

</section>

</body>
</html>
