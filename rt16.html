<!DOCTYPE html>
<html lang="id">
<head>

    <title>RT 16 - Desa Purbosari</title>

    <!-- CSS khusus RT 16 -->
    <style>
        .gallery-grid{

            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .gallery-item h3{
            font-size: 26px;
        }
    </style>

</head>

<body>

<section class="gallery">

    <h1>RT 16</h1>

    <div class="gallery-grid">

        <!-- Masjid Baituljannah -->

            <img src="images/masjid-baituljannah.jpeg" alt="Masjid Baituljannah">
            <h3>Masjid Baituljannah</h3>
        </div>

    </div>

    <a href="index.html" class="back-btn">

    </a>

</html>
